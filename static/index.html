<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Stock Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260422q" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-primary">
          <p class="eyebrow">Local-only watchlist</p>
          <h1>Daily stock charts for the companies you care about.</h1>
          <p class="hero-copy">
            This dashboard runs on your Mac, stores your watchlist locally, and
            pulls fresh daily market data only when you ask for it.
          </p>
        </div>
      </header>

      <section class="controls-panel collapsible-panel" data-collapsible="controls">
        <button class="panel-toggle" type="button" aria-expanded="true">
          <div class="panel-toggle-copy">
            <p class="overview-kicker">Controls</p>
            <h2>Refresh and display settings</h2>
            <p class="overview-note">Manage manual or automatic refresh, theme, currency, change mode, and range.</p>
          </div>
          <span class="panel-toggle-icon" aria-hidden="true"></span>
        </button>
        <div class="panel-body">
          <div class="controls-grid">
            <div class="refresh-controls">
              <button id="refresh-button" class="button button-primary">Refresh</button>
              <label class="range-picker">
                Refresh mode
                <select id="refresh-mode-select">
                  <option value="manual" selected>Manual</option>
                  <option value="auto">Auto refresh</option>
                </select>
              </label>
              <label id="refresh-interval-group" class="range-picker refresh-interval-group" hidden>
                Auto refresh every
                <div class="refresh-interval-input">
                  <input id="refresh-interval-input" type="number" min="1" step="1" value="5" />
                  <span class="refresh-interval-suffix">min</span>
                </div>
              </label>
            </div>
            <label class="range-picker">
              Theme
              <select id="theme-select">
                <option value="auto" selected>Auto</option>
                <option value="light">Light</option>
                <option value="dark">Dark</option>
              </select>
            </label>
            <label class="range-picker">
              Currency
              <select id="currency-select">
                <option value="USD" selected>USD</option>
                <option value="SGD">SGD</option>
              </select>
            </label>
            <label class="range-picker">
              Change
              <select id="change-mode-select">
                <option value="percent" selected>%</option>
                <option value="value">Value</option>
              </select>
            </label>
            <label class="range-picker">
              Range
              <select id="range-select">
                <option value="1mo">1M</option>
                <option value="3mo" selected>3M</option>
                <option value="6mo">6M</option>
                <option value="1y">1Y</option>
                <option value="5y">5Y</option>
                <option value="max">Max</option>
              </select>
            </label>
          </div>
        </div>
      </section>

      <main>
        <section class="stocks-panel collapsible-panel" data-collapsible="tickers">
          <button class="panel-toggle" type="button" aria-expanded="true">
            <div class="panel-toggle-copy">
              <p class="overview-kicker">Tickers</p>
              <h2>Your watchlist stocks</h2>
              <p class="overview-note">All current watchlist cards, prices, positions, and individual charts.</p>
            </div>
            <span class="panel-toggle-icon" aria-hidden="true"></span>
          </button>
          <div class="panel-body">
            <section class="watchlist-panel">
              <form id="watchlist-form">
                <div class="field-group">
                  <label for="symbol-input">Ticker</label>
                  <input id="symbol-input" name="symbol" placeholder="AAPL" maxlength="10" required />
                </div>
                <div class="field-group">
                  <label for="label-input">Label</label>
                  <input id="label-input" name="label" placeholder="Apple" maxlength="40" />
                </div>
                <button class="button" type="submit">Add to watchlist</button>
              </form>
              <p id="status-message" class="status-message">Loading watchlist…</p>
            </section>
            <section id="cards" class="card-grid" aria-live="polite"></section>
          </div>
        </section>

        <section class="overview-panel collapsible-panel" data-collapsible="benchmark">
          <button class="panel-toggle" type="button" aria-expanded="true">
            <div class="panel-toggle-copy">
              <p class="overview-kicker">Benchmark view</p>
              <h2>Watchlist average vs market benchmarks</h2>
              <p class="overview-note">All benchmark lines are normalized to the same starting point.</p>
            </div>
            <span class="panel-toggle-icon" aria-hidden="true"></span>
          </button>
          <div class="panel-body">
            <div class="overview-header">
              <div class="overview-metrics">
                <p id="overview-total-value" class="overview-total-value">Total watchlist value: --</p>
                <p id="overview-summary" class="overview-summary">Waiting for live data…</p>
              </div>
            </div>
            <div id="benchmark-controls" class="benchmark-controls"></div>
            <svg
              id="overview-chart"
              class="overview-chart"
              viewBox="0 0 960 320"
              preserveAspectRatio="none"
              role="img"
              aria-label="Watchlist average versus market benchmarks chart"
            ></svg>
            <div id="overview-legend" class="overview-legend"></div>
          </div>
        </section>

        <section class="news-panel collapsible-panel" data-collapsible="news">
          <button class="panel-toggle" type="button" aria-expanded="true">
            <div class="panel-toggle-copy">
              <p class="overview-kicker">Watchlist News</p>
              <h2>Top headlines from the last 3 days</h2>
              <p class="overview-note">Grouped by ticker so you can scan what is moving each name on your list.</p>
            </div>
            <span class="panel-toggle-icon" aria-hidden="true"></span>
          </button>
          <div class="panel-body">
            <div id="news-groups" class="news-groups" aria-live="polite"></div>
          </div>
        </section>

        <section class="market-panel collapsible-panel" data-collapsible="market">
          <button class="panel-toggle" type="button" aria-expanded="true">
            <div class="panel-toggle-copy">
              <p class="overview-kicker">Market View</p>
              <h2>Market heatmap by segment</h2>
              <p class="overview-note">A Finviz-style snapshot using major index and sector ETFs to show green and red across the market.</p>
            </div>
            <span class="panel-toggle-icon" aria-hidden="true"></span>
          </button>
          <div class="panel-body">
            <div id="market-summary" class="market-summary">Loading market overview…</div>
            <div id="market-groups" class="market-groups" aria-live="polite"></div>
            <div id="sector-detail" class="sector-detail" hidden></div>
          </div>
        </section>
      </main>
    </div>

    <template id="stock-card-template">
      <article class="stock-card">
        <div class="card-header">
          <div>
            <p class="stock-label"></p>
            <h2 class="stock-symbol"></h2>
          </div>
          <div class="card-actions">
            <span class="stock-live-badge"></span>
            <button class="remove-button" type="button">Remove</button>
          </div>
        </div>
        <div class="price-row">
          <div class="price-block">
            <span class="stock-price"></span>
            <span class="stock-change"></span>
          </div>
        </div>
        <div class="stock-info-block">
          <p class="stock-meta"></p>
          <p class="stock-live-status"></p>
          <p class="stock-premarket"></p>
        </div>
        <label class="stock-position-field">
          <span class="stock-position-label">Position</span>
          <input class="stock-position-input" type="text" inputmode="decimal" placeholder="Optional" />
        </label>
        <p class="stock-position-value"></p>
        <svg class="chart" viewBox="0 0 360 140" preserveAspectRatio="none" role="img"></svg>
      </article>
    </template>

    <script src="/static/app.js?v=20260422q" defer></script>
  </body>
</html>
